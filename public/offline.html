<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tidewell Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef1f4;
        color: #14202e;
        font-family: "Public Sans", system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid #dde3e9;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #586979;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>The app shell is cached. Reconnect when possible to sync queued updates.</p>
    </main>
  </body>
</html>
